version: "3.9"

services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: sales_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-sales_user}
      POSTGRES_PASSWORD: ${DB_PASS:-sales_pass}
      POSTGRES_DB:       ${DB_NAME:-sales_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sales_user} -d ${DB_NAME:-sales_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sales_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-sales_user}:${DB_PASS:-sales_pass}@db:5432/${DB_NAME:-sales_db}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Streamlit Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sales_dashboard
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_BASE_URL: http://backend:8000/api/v1
    ports:
      - "8501:8501"

  # ─── Data Stream Producer ────────────────────────────────────────────────────
  producer:
    build:
      context: ./data/generator
      dockerfile: Dockerfile
    container_name: sales_producer
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_URL: http://backend:8000/api/v1/sales/ingest

  # ─── (Optional) Zookeeper + Kafka ────────────────────────────────────────────
  # Uncomment to use real Kafka instead of the HTTP producer
  #
  # zookeeper:
  #   image: confluentinc/cp-zookeeper:7.7.0
  #   environment:
  #     ZOOKEEPER_CLIENT_PORT: 2181
  #
  # kafka:
  #   image: confluentinc/cp-kafka:7.7.0
  #   depends_on: [zookeeper]
  #   environment:
  #     KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
  #     KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
  #     KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  #   ports: ["9092:9092"]

volumes:
  pgdata:
